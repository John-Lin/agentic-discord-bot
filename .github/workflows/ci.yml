name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Ruff (Lint & Format)
        run: uv run ruff check . && uv run ruff format --check .

      - name: Run Ty (Type Check)
        run: uv run ty check

      - name: Run Tombi (TOML Check)
        run: uv run tombi check pyproject.toml

      - name: Run Pytest
        run: uv run pytest
